# 无人机任务参数配置
mission:
  # 视觉识别航点 [x, y] (相对起飞点)
  wp_recog_x: 4.0
  wp_recog_y: 0.0

  # 空投航点 [x, y] (相对起飞点)
  wp_airdrop_x: 10.0
  wp_airdrop_y: 5.0

  # 打击/观测航点 [x, y] (相对起飞点)
  wp_strike_x: 15.0
  wp_strike_y: -5.0

  # 起飞高度 (米)
  takeoff_height: 0.6

# PCL 点云检测初始状态
pcl_enable:
  initial_enable: false
